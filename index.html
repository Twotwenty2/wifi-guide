<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WiFi Channel Guide</title>
<style>
  :root {
    /* iOS System Colors */
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --border: #E5E5EA;
    --text: #000000;
    --text-sec: #8E8E93;
    --text-tert: #C7C7CC;
    --blue: #007AFF;
    --blue-bg: #E5F1FF;
    --green: #34C759;
    --green-bg: #EAF9EE;
    --orange: #FF9500;
    --orange-bg: #FFF4E5;
    --red: #FF3B30;
    --red-bg: #FFEBEA;
    --purple: #5856D6;
    --purple-bg: #EFEDFB;
    --indigo: #5E5CE6;
    --indigo-bg: #EAE9FB;
    --radius-lg: 20px;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 20px rgba(0,0,0,0.04);
  }

  /* Dark Mode Support */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1C1C1E;
      --border: #38383A;
      --text: #FFFFFF;
      --text-sec: #8E8E93;
      --blue: #0A84FF;
      --blue-bg: #00224A;
      --green: #32D74B;
      --green-bg: #0B3315;
      --orange: #FF9F0A;
      --orange-bg: #3D2200;
      --red: #FF453A;
      --red-bg: #3B0907;
      --purple: #BF5AF2;
      --purple-bg: #2B0A46;
      --indigo: #5E5CE6;
      --indigo-bg: #1B1A42;
      --shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  
  /* Layout */
  .app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 60px; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
  .screen { display: none; animation: fadeReveal 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .screen.active { display: block; }

  /* Navigation Bar */
  .topbar { 
    position: sticky; top: 0; z-index: 100;
    padding: 16px 20px; 
    display: flex; align-items: center; justify-content: center;
    background: rgba(242, 242, 247, 0.75); 
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
  }
  @media (prefers-color-scheme: dark) { .topbar { background: rgba(0, 0, 0, 0.75); } }
  .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
  .back-btn { 
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--blue);
    font-size: 17px; font-weight: 400; cursor: pointer;
    display: flex; align-items: center; gap: 4px; padding: 4px 8px 4px 0;
  }
  .back-btn::before { content: "‹"; font-size: 28px; line-height: 1; margin-top: -3px; font-weight: 300; }
  .back-btn:active { opacity: 0.6; }

  /* Hero */
  .hero { padding: 40px 24px 24px; text-align: center; }
  .hero h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 12px; }
  .hero p { font-size: 17px; color: var(--text-sec); line-height: 1.4; letter-spacing: -0.02em; }
  .hero-note { font-size: 14px; color: var(--text-sec); margin-top: 16px; padding: 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); display: inline-block; box-shadow: var(--shadow); line-height: 1.4; }

  /* Generic Sections */
  .section { padding: 0 20px 24px; }
  .section-label { font-size: 13px; font-weight: 400; text-transform: uppercase; color: var(--text-sec); margin: 0 0 8px 16px; letter-spacing: -0.01em; }
